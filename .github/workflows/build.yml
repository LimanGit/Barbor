name: Build and Package
on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release version tag (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gradle/wrapper-validation-action@v1
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 8
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set version from tag
        id: version                          # ✅ give this step an id
        run: |
          RAW_TAG="${{ github.event.inputs.tag }}"
          VERSION="${RAW_TAG#v}"
          VERSION="${VERSION:-1.0.0}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT   # ✅ use GITHUB_OUTPUT not GITHUB_ENV

      - name: Compile Kotlin Wrapper
        run: |
          cd wrappers/Kotlin
          sed -i "s/^version = .*/version = ${{ steps.version.outputs.value }}/" gradle.properties
          chmod +x gradlew
          ./gradlew shadowJar
          mv build/libs/barbor-${{ steps.version.outputs.value }}-all.jar .

      - uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: |
            wrappers/Javascript/barbor.js
            wrappers/Python/barbor.py
            wrappers/Kotlin/barbor-${{ steps.version.outputs.value }}-all.jar
            barbor.sh

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3

      - name: Set version from tag
        id: version                          # ✅ same pattern in release job
        run: |
          RAW_TAG="${{ github.event.inputs.tag }}"
          VERSION="${RAW_TAG#v}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            release-files/barbor.js
            release-files/barbor.py
            release-files/barbor-${{ steps.version.outputs.value }}-all.jar
            release-files/barbor.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
