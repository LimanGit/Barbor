# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.
name: Build and Package
on: [pull_request, push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gradle/wrapper-validation-action@v1
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 8
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Compile Kotlin Wrapper
        run: |
          cd wrappers/Kotlin
          chmod +x gradlew
          ./gradlew shadowJar
          mv build/libs/barbor-1.0.0-all.jar .
      - uses: actions/upload-artifact@v6
        with:
          name: Artifacts
          path: |
            wrappers/Javascript/barbor.js
            wrappers/Python/barbor.py
            wrappers/Kotlin/barbor-1.0.0-all.jar
            barbor.sh

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3

      - name: Get version tag input
        id: version
        run: echo "tag=${RELEASE_TAG:-v1.0.0}" >> $GITHUB_OUTPUT
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            release-files/barbor.js
            release-files/barbor.py
            release-files/barbor-1.0.0-all.jar
            release-files/barbor.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
